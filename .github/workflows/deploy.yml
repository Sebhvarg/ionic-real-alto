name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'yarn'
          cache-dependency-path: app/yarn.lock

      - name: Install dependencies
        run: |
          cd app
          yarn install

      - name: Build App
        run: |
          cd app
          yarn run build --base-href /ionic-real-alto/

      # Para evitar problemas con el router de Angular en GitHub Pages (404 al recargar)
      # creamos una copia de index.html llamada 404.html
      - name: Copy index.html to 404.html
        run: cp app/www/index.html app/www/404.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: app/www

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
